<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prima Larvae · Panel Hatchery</title>
  <meta name="description" content="Panel monitoring hatchery udang PT Prima Larvae — prototype." />

  <!-- Tailwind (CDN) untuk layout & responsif -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js (CDN) untuk grafik tren -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- Font aksesibilitas: Lexend (judul, dioptimalkan keterbacaan) + Source Sans 3 (teks) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eff5ff', 100: '#dbe8fe', 200: '#bfd6fe', 300: '#93bbfd',
              400: '#609afa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
              800: '#1e40af', 900: '#1e3a8a',
            },
            paper: '#f6f9fb',
            ink: '#1e293b',
          },
          fontFamily: {
            sans: ['"Source Sans 3"', 'system-ui', 'sans-serif'],
            display: ['Lexend', 'system-ui', 'sans-serif'],
            serif: ['Lexend', 'system-ui', 'sans-serif'],
          },
          borderRadius: { xl: '1rem', '2xl': '1.25rem' },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="text-ink font-sans antialiased">
  <div id="app" class="min-h-screen"></div>

  <!-- Titik masuk aplikasi (ES modules) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
